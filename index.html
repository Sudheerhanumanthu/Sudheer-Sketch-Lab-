<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudheer Sketch Lab</title>
<link rel="icon" type="image/png" href="logo.png">

<!-- FONT AWESOME (ICONS) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

/* HEADER */
header {
    background: black;
    color: white;
    padding: 0px;
    text-align: center;
}
.logo {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 0 auto;
}

/* HERO */
.hero {
    text-align: center;
    padding: 40px;
    background: ghostwhite;
    font-family: 'Times New Roman', Times, serif;
}

/* PRODUCTS */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 10px;
    padding: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.price {
    color: green;
    font-size: 18px;
    margin: 10px 0;
}

button {
    background: black;
    color: white;
    padding: 10px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #333;
}

/* FORM */
.form-section {
    background: white;
    margin: 20px;
    padding: 20px;
    border-radius: 10px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0px;
}

/* FLOAT BUTTONS */
.float-buttons {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.float-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    color: white;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.float-buttons a {
    text-decoration: none;
    color: inherit;
}

.whatsapp { background: #25D366; }
.call { background: #007BFF; }
.instagram { background: #E1306C; }

/* FOOTER */
footer {
    text-align: center;
    padding: 10px;
    background: black;
    color: white;
}
</style>

</head>
<body>
<header>
    <img src="Header.png" alt="Logo" class="logo">
</header>

<section class="hero">
    <h1><b>Custom Sketches</b> @ ₹99</h1>
    <p>Perfect gift for your loved ones ❤️</p>
</section>

<section class="products">

<div class="card">
    <img src="halfbody.png">
    <h3>Half Body Sketch</h3>
    <p class="price">₹99</p>
    <button onclick="selectProduct('Half Body Sketch', 99)">Order</button>
</div>

<div class="card">
    <img src="fullbody.png">
    <h3>Full Body Sketch</h3>
    <p class="price">₹149</p>
    <button onclick="selectProduct('Full Body Sketch', 149)">Order</button>
</div>

<div class="card">
    <img src="couple.png">
    <h3>Couple Sketch</h3>
    <p class="price">₹299</p>
    <button onclick="selectProduct('Couple Sketch', 299)">Order</button>
</div>
<div class="card">
    <h3>🚚📦</h3>
    <h3>Shipping charges:<span class="price"> + ₹49</span></h3>
    <p>Deliverable all over India 🇮🇳</p>
</div>

</section>

<section class="form-section">
    <h2>Order Now</h2>

    <form onsubmit="sendWhatsApp(event)">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="text" id="product" placeholder="Half body/Full body/Couple.. select above" readonly required>
        <input type="text" id="address" placeholder="Address" required>
        <textarea id="details" placeholder="Extra details"></textarea>
        <button type="submit">Order on WhatsApp</button>
    </form>
</section>

<footer>
    <p>© 2026 Sudheer Sketch Lab. All Rights Reserved.</p>
    <p style="font-size: 12px; opacity: 0.7;">Designed by Sudheer</p>
</footer>

<!-- FLOAT BUTTONS -->
<div class="float-buttons">

    <!-- WhatsApp -->
    <a id="whatsappBtn" target="_blank">
        <div class="float-btn whatsapp">
            <i class="fab fa-whatsapp"></i>
        </div>
    </a>

    <!-- Call -->
    <a href="tel:+917569205032">
        <div class="float-btn call">
            <i class="fas fa-phone"></i>
        </div>
    </a>

    <!-- Instagram -->
    <a href="https://www.instagram.com/sudheersketchlab?igsh=ZWxpa3lvYTRvbmg2" target="_blank">
        <div class="float-btn instagram">
            <i class="fab fa-instagram"></i>
        </div>
    </a>

</div>

<script>

// Store selected product + price
let selectedProduct = "";
let selectedPrice = 0;

// Select product (UPDATED)
function selectProduct(product, price) {
    selectedProduct = product;
    selectedPrice = price;

    document.getElementById("product").value = product + " ₹" + price;

    window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
}

// WhatsApp order
function sendWhatsApp(event) {
    event.preventDefault();

    let name = document.getElementById("name").value;
    let address = document.getElementById("address").value;
    let details = document.getElementById("details").value;

    let phone = "917569205032"; // NO + sign

    let delivery = 49;
    let total = selectedPrice + delivery;

    let msg = `New Order:%0A
Name: ${name}%0A
Product: ${selectedProduct}%0A
Product Price: ₹${selectedPrice}%0A
Delivery: ₹${delivery}%0A
Total: ₹${total}%0A
Address: ${address}%0A
Details: ${details}`;

    window.open(`https://wa.me/${phone}?text=${msg}`, "_blank");
}

// Floating WhatsApp button
let phone = "917569205032";
let defaultMsg = "Hi, I want to order a sketch";

document.getElementById("whatsappBtn").href =
    `https://wa.me/${phone}?text=${encodeURIComponent(defaultMsg)}`;

</script>
</body>
</html>
